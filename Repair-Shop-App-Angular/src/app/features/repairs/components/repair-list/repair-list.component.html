<div>
  <h2>Repairs</h2>

  <!-- Empty -->
  <app-empty-state *ngIf="repairs.length === 0" message="No repairs found"> </app-empty-state>

  <!-- Table -->
  <table *ngIf="repairs.length > 0" border="1" width="100%">
    <thead>
      <tr>
        <th>ID</th>
        <th>Device Id</th>
        <th>Issue</th>
        <th>Status Step Id</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of repairs">
        <td>{{ r.id }}</td>
        <td>{{ r.deviceId }}</td>
        <td>{{ r.issueDescription }}</td>
        <td>{{ r.statusStepId }}</td>
        <td>
          <button [routerLink]="['/repairs', r.id]">View</button>
          <button (click)="delete(r.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
