<div class="page">
  <div class="header">
    <h2>Repair Management</h2>
    <p>Manage all repair tickets</p>
  </div>

  <div class="card" *ngIf="repairs.length > 0; else empty">
    <table>
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Device</th>
          <th>Owner</th>
          <th>Status</th>
          <th>Received Date</th>

          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of repairs">
          <!-- Ticket ID -->
          <td class="ticket">#{{ r.id }}</td>

          <!-- Device -->
          <td class="device-cell">
            <div class="device-main">
              <span class="icon">{{ getDeviceIcon(r.deviceId) }}</span>
              <span class="name">{{ getDeviceName(r.deviceId) }}</span>
            </div>

            <div class="subtitle">
              {{ r.problemDescription }}
            </div>
          </td>

          <!-- Owner -->
          <td>{{ getOwnerName(r.deviceId) }}</td>

          <!-- Status (FIXED) -->
          <td>
            <span class="badge" [ngClass]="getStatusClass(r.currentStatusName)">
              {{ r.currentStatusName }}
            </span>
          </td>

          <!-- Date (FIXED FROM API) -->
          <td>
            {{ r.createdAt | date: 'MMM d, y' }}
          </td>

          <td class="actions">
            <a [routerLink]="['/repairs/edit', r.id]" class="btn-edit"> Edit </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #empty>
    <app-empty-state></app-empty-state>
  </ng-template>
</div>
