<div class="page">
  <div class="header">
    <h2>Status Steps</h2>
  </div>

  <!-- ADD NEW -->
  <div class="card add-box">
    <input [(ngModel)]="newStepName" placeholder="Enter new status step" />

    <button (click)="add()">Add</button>
  </div>

  <!-- TABLE -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of steps">
          <td>{{ s.id }}</td>
          <td>{{ s.name }}</td>
          <td>
            <button class="danger" (click)="deleteStatus(s.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
