<div class="form-container">
  <h2>Add Device</h2>

  <form (ngSubmit)="submit()">
    <div>
      <label>Name</label>
      <input type="text" [(ngModel)]="device.name" name="name" required />
    </div>

    <div>
      <label>Serial Number</label>
      <input type="text" [(ngModel)]="device.serialNumber" name="serialNumber" required />
    </div>

    <div>
      <label>Device Type Id</label>
      <input type="number" [(ngModel)]="device.deviceTypeId" name="deviceTypeId" required />
    </div>

    <button type="submit">Save</button>
  </form>
</div>
