<div class="form-container">
  <h2>Add Device</h2>

  <form (ngSubmit)="save()">
    <label>Brand</label>
    <input type="text" [(ngModel)]="device.brand" name="brand" required />

    <label>Model</label>
    <input type="text" [(ngModel)]="device.model" name="model" required />

    <label>Serial Number</label>
    <input type="text" [(ngModel)]="device.serialNumber" name="serialNumber" />

    <label>Owner Name</label>
    <input type="text" [(ngModel)]="device.ownerName" name="ownerName" required />

    <label>Owner Phone</label>
    <input type="text" [(ngModel)]="device.ownerPhone" name="ownerPhone" required />

    <label>Device Type ID</label>
    <input type="number" [(ngModel)]="device.deviceTypeId" name="deviceTypeId" required />

    <button type="submit">{{ deviceId ? 'Update' : 'Add' }} Device</button>
  </form>
</div>
