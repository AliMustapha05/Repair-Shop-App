<div class="overlay" *ngIf="isVisible">
  <div class="dialog">
    <h3 class="title">{{ title }}</h3>

    <p class="message">{{ message }}</p>

    <div class="actions">
      <button class="btn cancel" (click)="cancel()">Cancel</button>
      <button class="btn danger" (click)="confirm()">Confirm</button>
    </div>
  </div>
</div>
